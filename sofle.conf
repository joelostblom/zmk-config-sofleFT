# Wyświetlacz - włączamy ZMK_DISPLAY (działa zarówno z OLED jak i nice!view)
CONFIG_ZMK_DISPLAY=y

# Enkodery - oba (lewy i prawy)
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Per-key RGB - 30 LED per strona (bez underglow)
CONFIG_ZMK_RGB_UNDERGLOW=y

# RGB nie ma wyłączać external power - inaczej display się wyłączy razem z LEDami
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n

# Nazwa klawiatury
CONFIG_ZMK_KEYBOARD_NAME="Sofle FT"

# BT moc
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Sleep
CONFIG_ZMK_SLEEP=y

# ZMK Studio (shield sofle ma już feature 'studio' w upstream)
CONFIG_ZMK_STUDIO=y

# Eager debouncing (jak w innych klawiaturach FT)
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=7

# Auto-off RGB - oszczędza baterię (odkomentuj jeśli chcesz)
# CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
# CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_USB=y
