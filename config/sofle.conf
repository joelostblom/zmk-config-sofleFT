# Display - enable ZMK_DISPLAY (works with both OLED and nice!view)
CONFIG_ZMK_DISPLAY=y

# Encoders - both left and right
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Per-key RGB - 30 LEDs per side (without underglow)
CONFIG_ZMK_RGB_UNDERGLOW=y

# RGB should not disable external power, otherwise the display turns off with the LEDs
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n

# Keyboard name
CONFIG_ZMK_KEYBOARD_NAME="Sofle FT"

# BT power
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Sleep
CONFIG_ZMK_SLEEP=y

# ZMK Studio (the Sofle shield already has the 'studio' feature upstream)
CONFIG_ZMK_STUDIO=y

# Eager debouncing (as in other FT keyboards)
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=7

# RGB auto-off - saves battery (uncomment if desired)
# CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
# CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_USB=y
